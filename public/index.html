<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trym - URL Shortener</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 Trym</h1>
            <p class="tagline">A Simple Monolithic URL Shortener</p>
        </header>

        <main>
            <div class="card">
                <h2>Shorten Your URL</h2>
                <form id="shortenForm">
                    <div class="form-group">
                        <label for="originalUrl">Long URL</label>
                        <input 
                            type="url" 
                            id="originalUrl" 
                            placeholder="https://example.com/very/long/url" 
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="customCode">Custom Code (Optional)</label>
                        <input 
                            type="text" 
                            id="customCode" 
                            placeholder="mycode" 
                            pattern="[a-zA-Z0-9]+"
                            title="Only alphanumeric characters allowed"
                        >
                    </div>
                    <button type="submit" class="btn btn-primary">Shorten URL</button>
                </form>

                <div id="result" class="result hidden">
                    <h3>✓ URL Shortened Successfully!</h3>
                    <div class="result-content">
                        <div class="url-display">
                            <label>Short URL:</label>
                            <div class="url-box">
                                <input type="text" id="shortUrl" readonly>
                                <button class="btn btn-copy" onclick="copyToClipboard()">Copy</button>
                            </div>
                        </div>
                        <div class="url-info">
                            <p><strong>Original URL:</strong> <span id="originalUrlDisplay"></span></p>
                            <p><strong>Short Code:</strong> <span id="shortCodeDisplay"></span></p>
                        </div>
                    </div>
                </div>

                <div id="error" class="error hidden">
                    <p id="errorMessage"></p>
                </div>
            </div>

            <div class="stats card">
                <h3>Service Stats</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalUrls">-</div>
                        <div class="stat-label">Total URLs</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalRedirects">-</div>
                        <div class="stat-label">Total Redirects</div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>Trym URL Shortener - A Monolithic Application</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
